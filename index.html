<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 视口设置：适配移动端，宽度=device-width表示宽度等于设备屏幕宽度，initial-scale=1.0表示初始缩放比例1:1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题：显示在浏览器标签栏 -->
    <title>徐聪敏个人作品 </title>
    <style>
        /* ===================== 全局样式：极简风格 ===================== */
        /* 通配符选择器：选中页面所有元素，统一初始化样式 */
        * {
            margin: 0; /* 清除默认外边距 */
            padding: 0; /* 清除默认内边距 */
            box-sizing: border-box; /* 盒模型：宽高包含边框和内边距，避免布局变形 */
            /* 设置字体：优先微软雅黑，其次Helvetica Neue，再Arial，最后通用无衬线字体 */
            font-family: -apple-system, BlinkMacMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        /* 页面主体样式 */
        body {
            background-color: #f9f9f9; /* 页面背景色：浅灰色，极简风格 */
            color: #333; /* 默认文字颜色：深灰色，提升可读性 */
            line-height: 1.3; /* 行高：增强文字行间距，提升阅读体验 */
            padding: 0;
            margin: 0;
            padding-top: 60px; /* 顶部留白：给固定导航栏留出空间，避免内容被遮挡 */
        }

        /* ===================== 顶部固定导航栏样式 ===================== */
        .top-fixed {
            position: fixed; /* 固定定位：始终悬浮在页面顶部 */
            top: 0; /* 距离顶部0像素 */
            left: 0; /* 距离左侧0像素 */
            width: 100%; /* 宽度100%，铺满屏幕 */
            height: 60px; /* 导航栏高度 */
            background-color: #111; /* 导航栏背景色：深黑色 */
            border-bottom: 1px solid #eee; /* 底部边框：浅灰色，分隔导航栏和内容 */
            z-index: 9999; /* 层级：设置极高值，确保导航栏在所有元素上方 */
            display: flex; /* 弹性布局：方便内部文字垂直居中 */
            align-items: center; /* 垂直居中对齐 */
            padding: 0 5%; /* 左右内边距：5%，与头部标题区呼应，避免文字贴边 */
        }

        /* 顶部固定导航栏文字样式 */
        .top-fixed-text {
            font-size: 1rem; /* 字体大小：1rem=16px（默认），适配不同屏幕 */
            font-weight: 600; /* 字体粗细：600（半粗），增强视觉突出 */
            letter-spacing: 0.05em; /* 字间距：0.05em，提升文字呼吸感 */
            color: #fff; /* 文字颜色：白色，适配深色背景 */
        }

        /* ===================== 头部标题区样式 ===================== */
        .header {
            width: 100%; /* 宽度100% */
            padding: 1rem 5%; /* 上下内边距3rem，左右5%，提升空间感 */
            background-color: #fff; /* 背景色：白色，与页面浅灰背景区分 */
            border-bottom: 1px solid #eee; /* 底部边框：浅灰色，分隔头部和内容区 */
            text-align: center; /* 文字居中对齐 */
            position: relative; /* 相对定位：为伪元素（装饰线）提供定位参考 */
            overflow: hidden; /* 隐藏溢出内容，避免装饰元素超出 */
        }

        /* 头部内容容器：约束最大宽度，避免大屏下文字过宽 */
        .header-inner {
            max-width: 1200px; /* 最大宽度1200px */
            margin: 0 auto; /* 左右自动居中 */
        }

        /* 头部主标题样式 */
        .header h1 {
            font-size: 1.8rem; /* 字体大小：2.8rem，突出主标题 */
            font-weight: 700; /* 字体粗细：700（粗体） */
            letter-spacing: 0.12em; /* 字间距：增强标题质感 */
            margin-bottom: 0.4rem; /* 底部外边距：与副标题分隔 */
            color: #222; /* 文字颜色：比默认#333更深，增强对比 */
            position: relative; /* 相对定位：为底部装饰线提供参考 */
            display: inline-block; /* 行内块：让装饰线宽度适配标题宽度 */
       7}


        /* 头部副标题样式 */
        .header p {
            color: #666; /* 文字颜色：中灰色，弱化副标题，突出主标题 */
            font-size: 1.1rem; /* 字体大小：1.1rem */
            font-weight: 300; /* 字体粗细：300（细体） */
            letter-spacing: 0.08em; /* 字间距：提升呼吸感 */
            line-height: 1.8; /* 行高：增强可读性 */
            margin-top: 0.5rem; /* 顶部外边距：与主标题分隔 */
        }

        /* ===================== 视频作品容器：核心布局 ===================== */
        .works-container {
            width: 95%; /* 宽度95%，减少左右留白 */
            max-width: 1400px; /* 最大宽度1400px，适配2列布局 */
            margin: 3rem auto; /* 上下外边距4rem，左右自动居中 */
            display: grid; /* 网格布局：实现多列排版 */
            grid-template-columns: repeat(2, 1fr); /* 强制2列布局，每列等分宽度（1fr=等分剩余空间） */
            gap: 2.5rem; /* 列/行间距：2.5rem，2列布局间距更协调 */
        }

        /* ===================== 视频卡片样式 ===================== */
        .work-card {
            background-color: #fff; /* 卡片背景色：白色 */
            border-radius: 10px; /* 卡片圆角：4px，弱化直角 */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); /* 卡片阴影：浅阴影，增强立体感，不突兀 */
            overflow: hidden; /* 隐藏溢出内容：避免视频/文字超出卡片 */
            transition: transform 0.3s ease; /* 过渡动画：transform属性变化时，0.3秒缓动 */
        }

        /* 卡片hover效果：鼠标悬浮时上移5px，增强交互感 */
        .work-card:hover {
            transform: translateY(-5px); /* 向上平移5px */
        }

        /* 视频容器：固定16:9比例，避免视频变形 */
        .video-wrapper {
            position: relative; /* 相对定位：为iframe提供定位参考 */
            width: 100%; /* 宽度100%，适配卡片宽度 */
            padding-top: 56.25%; /* 16:9比例核心：padding-top=9/16=56.25%，高度随宽度等比变化 */
            overflow: hidden; /* 隐藏溢出内容 */
        }

        /* 视频iframe样式：嵌入B站视频播放器 */
        .video-wrapper iframe {
            position: absolute; /* 绝对定位：铺满video-wrapper */
            top: 0; /* 距离顶部0 */
            left: 0; /* 距离左侧0 */
            width: 100%; /* 宽度100% */
            height: 100%; /* 高度100% */
            border: none; /* 清除iframe默认边框 */
        }

        /* 作品信息区：卡片下方的标题和描述 */
        .work-info {
            padding: 1.5rem; /* 内边距2rem，适配2列布局的卡片尺寸 */
        }

        /* 作品标题样式 */
        .work-info h3 {
            font-size: 1.3rem; /* 字体大小：1.3rem */
            font-weight: 700; /* 粗体，突出标题 */
            margin-bottom: 0.3rem; /* 底部外边距：与描述分隔 */
            letter-spacing: 0.01em; /* 字间距：轻微调整，提升质感 */
        }

        /* 作品描述样式 */
        .work-info p {
            color: #666; /* 中灰色，弱化描述 */
            font-size: 1.1rem; /* 字体大小：1.2rem */
            font-weight: 300; /* 细体 */
            line-height: 1.5; /* 行高：增强可读性 */
            letter-spacing: 0.01em; /* 字间距：轻微调整 */
        }

        /* ===================== 页脚样式 ===================== */
        .footer {
            width: 100%; /* 宽度100% */
            padding: 2rem 0; /* 上下内边距2rem，左右0 */
            text-align: center; /* 文字居中 */
            color: #999; /* 浅灰色，弱化页脚 */
            font-size: 0.9rem; /* 小字体 */
            border-top: 1px solid #eee; /* 顶部边框：分隔内容区和页脚 */
            margin-top: 5rem; /* 顶部外边距：增加与内容区的距离 */
        }

        /* ===================== 移动端适配（768px以下屏幕） ===================== */
        @media (max-width: 768px) {
            /* 移动端顶部固定导航栏 */
            .top-fixed {
                height: 50px; /* 高度缩小为50px，适配移动端 */
                background-color: #111; /* 同步深黑色背景 */
            }
            /* 移动端导航栏文字 */
            .top-fixed-text {
                font-size: 0.9rem; /* 字体缩小为0.9rem */
                font-weight: 600; /* 保持半粗 */
                color: #fff; /* 保持白色 */
            }
            /* 移动端页面主体：顶部留白适配导航栏高度 */
            body {
                padding-top: 50px;
            }

            /* 移动端头部主标题 */
            .header h1 {
                font-size: 2rem; /* 字体缩小为2.2rem */
                font-weight: 800; /* 加粗为800，增强移动端视觉 */
                letter-spacing: 0.05em; /* 减少字间距 */
            }


            /* 移动端头部副标题 */
            .header p {
                font-size: 1rem; /* 字体缩小为1rem */
                letter-spacing: 0.05em; /* 减少字间距 */
            }

            /* 移动端作品容器：改为1列布局 */
            .works-container {
                width: 95%; /* 宽度95%，适配移动端屏幕 */
                grid-template-columns: 1fr; /* 1列布局 */
                gap: 2rem; /* 行间距缩小为2rem */
            }
            /* 移动端作品信息区：减少内边距 */
            .work-info {
                padding: 1rem;
            }
        }

        /* ===================== 大屏适配（1920px以上屏幕） ===================== */
        @media (min-width: 1920px) {
            /* 大屏头部主标题：放大字体 */
            .header h1 {
                font-size: 3.2rem;
            }
            /* 大屏作品容器：放宽最大宽度，让卡片更大 */
            .works-container {
                max-width: 1600px;
            }
        }
    </style>
	
	
</head>
