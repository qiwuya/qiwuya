<!DOCTYPE html>
<!-- ============================================== -->
<!-- 文档类型声明：告诉浏览器这是HTML5标准的网页文件 -->
<!-- ============================================== -->
<html lang="zh-CN">
<!-- html根标签：整个网页的所有内容都包裹在这个标签里 -->
<!-- lang="zh-CN"：声明网页的主要语言是中文，利于搜索引擎识别 -->

<!-- ============================================== -->
<!-- head头部区域：给浏览器/搜索引擎看的配置信息，不显示在页面上 -->
<!-- ============================================== -->
<head>
    <!-- 字符编码设置：UTF-8是通用编码，支持所有中文和特殊符号，避免乱码 -->
    <meta charset="UTF-8">
    
    <!-- 移动端适配设置：让网页在手机/平板等设备上正常显示 -->
    <!-- width=device-width：网页宽度适配设备屏幕宽度 -->
    <!-- initial-scale=1.0：网页初始缩放比例为1:1，不缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 网页标题：显示在浏览器标签页上的文字 -->
    <title>徐聪敏个人作品 </title>

    <!-- ============================================== -->
    <!-- style样式标签：定义网页所有元素的外观（颜色、大小、位置等） -->
    <!-- ============================================== -->
    <style>
        /* ---------------- 全局基础样式：统一所有元素的默认表现 ---------------- */
        * {
            margin: 0;          /* 去掉所有元素默认的外边距（上下左右的空白） */
            padding: 0;         /* 去掉所有元素默认的内边距（内容和边框的空白） */
            box-sizing: border-box; /* 让元素的宽高计算更直观，不会因内边距/边框变形 */
            /* 设置网页字体：优先用系统自带字体，保证不同设备显示一致、美观 */
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Inter, sans-serif;
        }

        /* ---------------- 网页主体（body）样式：整个页面的基础外观 ---------------- */
        body {
            background-color: #f9f9f9; /* 网页背景色：浅灰色，护眼且高级 */
            color: #333;               /* 文字默认颜色：深灰色（比纯黑更柔和） */
            line-height: 1.3;          /* 文字行高：控制行与行之间的距离，不拥挤 */
            padding: 0;                /* 去掉body默认内边距 */
            margin: 0;                 /* 去掉body默认外边距 */
            padding-top: 60px;         /* 顶部预留60px空白，避免内容被顶部导航栏遮挡 */
        }

        /* ---------------- 顶部固定导航栏样式：页面最上方的黑色条 ---------------- */
        .top-fixed {
            position: fixed;    /* 固定定位：导航栏始终停在屏幕顶部，滚动页面也不动 */
            top: 0;             /* 导航栏顶部贴紧屏幕顶部 */
            left: 0;            /* 导航栏左侧贴紧屏幕左侧 */
            width: 100%;        /* 导航栏宽度占满整个屏幕 */
            height: 60px;       /* 导航栏高度60px */
            background-color: #111; /* 导航栏背景色：纯黑色 */
            border-bottom: 1px solid #eee; /* 导航栏底部加一条浅灰色分隔线 */
            z-index: 9999;      /* 层级优先级：保证导航栏在所有内容上方，不被遮挡 */
            display: flex;      /* 弹性布局：让内部文字居中显示 */
            align-items: center;/* 垂直居中：文字在导航栏里上下居中 */
            padding: 0 5%;      /* 左右各留5%空白，文字不贴边 */
        }

        /* 顶部导航栏内的文字样式 */
        .top-fixed-text {
            font-size: 1rem;       /* 文字大小：1rem=16px（适配不同设备） */
            font-weight: 600;      /* 文字粗细：600是半粗体，醒目但不夸张 */
            letter-spacing: 0.05em; /* 文字间距：字母/汉字之间的距离，更易读 */
            color: #fff;           /* 文字颜色：白色，在黑色背景上对比明显 */
        }

        /* ---------------- 头部标题区样式：“视频案例”大标题区域 ---------------- */
        .header {
            width: 100%;            /* 宽度占满屏幕 */
            padding: 1rem 5%;       /* 上下内边距1rem，左右留白5% */
            background-color: #fff; /* 背景色：白色，突出标题 */
            border-bottom: 1px solid #eee; /* 底部浅灰色分隔线，区分标题和内容 */
            text-align: center;     /* 文字居中显示 */
            position: relative;     /* 相对定位：为内部元素定位做准备 */
            overflow: hidden;       /* 隐藏超出区域的内容，避免变形 */
        }

        /* 标题区内部容器：限制最大宽度，大屏下标题不显得太宽 */
        .header-inner {
            max-width: 1200px;  /* 最大宽度1200px */
            margin: 0 auto;     /* 左右自动居中 */
        }

        /* “视频案例”大标题样式 */
        .header h1 {
            font-size: 1.8rem;      /* 标题大小：1.8rem=28.8px */
            font-weight: 700;       /* 文字粗细：700是粗体，突出标题 */
            letter-spacing: 0.12em; /* 文字间距：拉开一点，更大气 */
            margin-bottom: 0.4rem;  /* 标题下方留0.4rem空白，区分描述文字 */
            color: #222;            /* 标题颜色：深黑色，醒目 */
            position: relative;     /* 相对定位 */
            display: inline-block;  /* 行内块：让标题能居中且保留宽高 */
        }

        /* 标题下方描述文字样式（当前代码里没用到，但保留样式） */
        .header p {
            color: #666;            /* 文字颜色：浅灰色，作为辅助说明 */
            font-size: 1.1rem;      /* 文字大小：1.1rem=17.6px */
            font-weight: 300;       /* 文字粗细：300是细体，不抢标题风头 */
            letter-spacing: 0.08em; /* 文字间距：略拉开，提升可读性 */
            line-height: 1.8;       /* 行高：控制行间距 */
            margin-top: 0.5rem;     /* 顶部留空白，和标题分开 */
        }

        /* ---------------- 视频作品容器：所有视频卡片的外层盒子 ---------------- */
        .works-container {
            width: 95%;             /* 宽度占屏幕95%，左右留边更美观 */
            max-width: 1400px;      /* 最大宽度1400px，大屏下不显得太宽 */
            margin: 3rem auto;      /* 上下留3rem空白，左右自动居中 */
            display: grid;          /* 网格布局：自动排列视频卡片，比表格更灵活 */
            grid-template-columns: repeat(2, 1fr); /* 一行放2个视频，宽度均分 */
            gap: 2.5rem;            /* 视频卡片之间的间距：2.5rem，不拥挤 */
        }

        /* ---------------- 单个视频卡片样式：每个视频的白色卡片 ---------------- */
        .work-card {
            background-color: #fff; /* 卡片背景色：白色 */
            border-radius: 10px;    /* 卡片圆角：10px，边角圆润不尖锐 */
            /* 卡片阴影：轻微的灰色阴影，让卡片有立体感，不贴在背景上 */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;       /* 隐藏超出卡片的内容，保证圆角生效 */
            transition: transform 0.3s ease; /* 过渡动画：鼠标悬浮时的动画效果 */
        }

        /* 鼠标悬浮在视频卡片上的效果：卡片轻微上浮，提升交互体验 */
        .work-card:hover {
            transform: translateY(-5px); /* 向上移动5px */
        }

        /* ---------------- 视频播放器容器：保证视频16:9比例，不变形 ---------------- */
        .video-wrapper {
            position: relative;     /* 相对定位：让内部iframe绝对定位 */
            width: 100%;            /* 宽度占满卡片 */
            padding-top: 56.25%;    /* 16:9视频比例：56.25% = 9/16，保证视频不变形 */
            overflow: hidden;       /* 隐藏超出容器的内容 */
        }

        /* 视频播放器（iframe）样式：嵌入B站视频的核心标签 */
        .video-wrapper iframe {
            position: absolute;     /* 绝对定位：填满外层容器 */
            top: 0;                 /* 顶部贴紧容器 */
            left: 0;                /* 左侧贴紧容器 */
            width: 100%;            /* 宽度占满容器 */
            height: 100%;           /* 高度占满容器 */
            border: none;           /* 去掉iframe默认的边框，更美观 */
        }

        /* ---------------- 视频卡片下方的标题+描述区域 ---------------- */
        .work-info {
            padding: 1.5rem;        /* 内边距：1.5rem，文字不贴边 */
        }

        /* 视频标题样式 */
        .work-info h3 {
            font-size: 1.3rem;      /* 标题大小：1.3rem=20.8px */
            font-weight: 700;       /* 粗体，突出标题 */
            margin-bottom: 0.3rem;  /* 标题下方留空白，区分描述文字 */
            letter-spacing: 0.01em; /* 轻微文字间距，提升可读性 */
        }

        /* 视频描述文字样式 */
        .work-info p {
            color: #666;            /* 浅灰色，辅助说明 */
            font-size: 1.1rem;      /* 1.1rem=17.6px */
            font-weight: 300;       /* 细体，不抢标题风头 */
            line-height: 1.5;       /* 行高，控制行间距 */
            letter-spacing: 0.01em; /* 轻微文字间距 */
        }

        /* ---------------- 页脚样式：页面最底部的联系邮箱区域 ---------------- */
        .footer {
            width: 100%;            /* 宽度占满屏幕 */
            padding: 2rem 0;        /* 上下内边距2rem，左右无 */
            text-align: center;     /* 文字居中 */
            color: #999;            /* 浅灰色，低调不抢眼 */
            font-size: 0.9rem;      /* 小号字体：0.9rem=14.4px */
            border-top: 1px solid #eee; /* 顶部浅灰色分隔线，区分内容和页脚 */
            margin-top: 5rem;       /* 顶部留5rem空白，和视频内容分开 */
        }

        /* ---------------- 移动端适配：屏幕宽度≤768px（手机/小平板）时生效 ---------------- */
        @media (max-width: 768px) {
            /* 移动端导航栏调整 */
            .top-fixed {
                height: 50px;       /* 导航栏高度缩短为50px，适配手机 */
                background-color: #111; /* 保持黑色背景 */
            }
            /* 移动端导航栏文字调整 */
            .top-fixed-text {
                font-size: 0.9rem;  /* 文字缩小为0.9rem，适配手机 */
                font-weight: 600;   /* 保持半粗体 */
                color: #fff;        /* 保持白色 */
            }
            /* 移动端body调整 */
            body {
                padding-top: 50px;  /* 顶部预留空白改为50px，匹配导航栏高度 */
            }

            /* 移动端标题调整 */
            .header h1 {
                font-size: 2rem;    /* 标题放大为2rem，手机上更醒目 */
                font-weight: 800;   /* 更粗的字体，突出标题 */
                letter-spacing: 0.05em; /* 文字间距略缩小 */
            }

            /* 移动端标题描述文字调整 */
            .header p {
                font-size: 1rem;    /* 文字大小1rem */
                letter-spacing: 0.05em; /* 文字间距略缩小 */
            }

            /* 移动端视频容器调整 */
            .works-container {
                width: 95%;         /* 宽度保持95% */
                grid-template-columns: 1fr; /* 一行只放1个视频，适配手机屏幕 */
                gap: 2rem;          /* 视频间距缩小为2rem */
            }
            /* 移动端视频卡片文字区域调整 */
            .work-info {
                padding: 1rem;      /* 内边距缩小为1rem，节省空间 */
            }
        }

        /* ---------------- 大屏适配：屏幕宽度≥1920px（电脑大屏）时生效 ---------------- */
        @media (min-width: 1920px) {
            /* 大屏标题调整 */
            .header h1 {
                font-size: 3.2rem; /* 标题放大为3.2rem，大屏更大气 */
            }
            /* 大屏视频容器调整 */
            .works-container {
                max-width: 1600px; /* 最大宽度改为1600px，适配大屏 */
            }
        }
    </style>
</head>
