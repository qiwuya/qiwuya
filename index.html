    <style>
        /* 全局样式：极简风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans SC", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }

        /* 顶部标题区 */
        .header {
            width: 100%;
            padding: 2rem 5%;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #666;
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        /* 视频作品容器：核心修改 - 限制2列、适配宽度 */
        .works-container {
            width: 95%; /* 减少左右留白 */
            max-width: 1400px; /* 适配2列布局的最大宽度 */
            margin: 4rem auto;
            display: grid;
            /* 核心：强制2列布局，每列等分宽度 */
            grid-template-columns: repeat(2, 1fr);
            gap: 2.5rem; /* 2列布局间距适度放大，视觉更协调 */
        }

        /* 视频卡片样式 */
        .work-card {
            background-color: #fff;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .work-card:hover {
            transform: translateY(-5px);
        }

        /* 视频容器：固定16:9比例，避免变形 */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 比例核心 */
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 作品信息区：适配2列布局的卡片尺寸 */
        .work-info {
            padding: 2rem; /* 内边距增加，适配更大的2列卡片 */
        }

        .work-info h3 {
            font-size: 1.4rem; /* 标题字体放大 */
            font-weight: 400;
            margin-bottom: 0.8rem;
            letter-spacing: 0.03em;
        }

        .work-info p {
            color: #666;
            font-size: 1rem; /* 描述字体放大 */
            line-height: 1.5;
        }

        /* 页脚 */
        .footer {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            margin-top: 5rem;
        }

        /* 手机端适配（768px以下屏幕） */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .works-container {
                width: 95%; /* 手机端恢复合理宽度 */
                grid-template-columns: 1fr; /* 手机端1列 */
                gap: 2rem;
            }
            .work-info {
                padding: 1rem;
            }
        }

        /* 大屏（1920px以上）适配：微调2列宽度 */
        @media (min-width: 1920px) {
            .works-container {
                max-width: 1600px; /* 超宽屏放宽最大宽度，让卡片更大 */
            }
        }
    </style>
</head>
